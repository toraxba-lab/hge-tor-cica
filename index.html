<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Sistema HGE</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
</head>
<body>
  <h1>Sistema HGE</h1>
  <div id="status">Conectando ao banco...</div>

  <script>
    // PARE AQUI: Cole as chaves que você copiou do site do Firebase abaixo
    const firebaseConfig = {
      apiKey: "SUA_API_KEY",
      authDomain: "SEU_PROJETO.firebaseapp.com",
      projectId: "SEU_PROJETO_ID",
      storageBucket: "SEU_PROJETO.appspot.com",
      messagingSenderId: "SEU_ID",
      appId: "SUA_APP_ID"
    };

    // Inicializa o Firebase
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    // Teste de conexão
    document.getElementById('status').innerText = "Conectado ao Firebase com Sucesso!";
  </script>
</body>
</html>
